name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.9'
      - run: |
          julia -e 'using Pkg; Pkg.add("Chess")' 2>/dev/null || true
      - run: julia test/runtests.jl
      - run: julia test/verify_repetition.jl
      - run: julia test/verify_field_updater.jl
